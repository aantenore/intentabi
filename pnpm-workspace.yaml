packages:
  - apps/*
  - packages/*

allowBuilds:
  esbuild: true
  semwitness@https://codeload.github.com/aantenore/semwitness/tar.gz/01683a35a7305a5f30dc35077b722f5515bc209c: true

# Native Codex packages are ignored workspace-wide, so the research-only
# codex-bench app requires and verifies an explicit codexPathOverride instead.
ignoredOptionalDependencies:
  - "@openai/codex-darwin-arm64"
  - "@openai/codex-darwin-x64"
  - "@openai/codex-linux-arm64"
  - "@openai/codex-linux-x64"
  - "@openai/codex-win32-arm64"
  - "@openai/codex-win32-x64"
