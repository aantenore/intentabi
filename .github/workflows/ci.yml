name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Node 24 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: intentabi workspace
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: intentabi workspace
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: intentabi workspace/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Run CLI fixture smoke
        env:
          INTENTABI_HMAC_SECRET: intentabi-ci-fixture-key-32-bytes-minimum
        run: >-
          pnpm shadow
          --config config/intentabi.example.json
          --request fixtures/shadow-request.json

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intentabi workspace
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: intentabi workspace
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: intentabi workspace/pnpm-lock.yaml
      - run: pnpm audit --prod --audit-level=high
